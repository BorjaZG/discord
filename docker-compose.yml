version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord_api
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-discord_user}
      DB_PASSWORD: ${DB_PASSWORD:-discord_pass}
      DB_DATABASE: ${DB_DATABASE:-discord_db}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: discord_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-discord_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-discord_pass}
      POSTGRES_DB: ${DB_DATABASE:-discord_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-discord_user} -d ${DB_DATABASE:-discord_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
